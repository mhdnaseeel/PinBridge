<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PinBridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      --glass-bg: rgba(255, 255, 255, 0.8);
      --glass-border: rgba(255, 255, 255, 0.4);
      --text-main: #0f172a;
      --text-muted: #64748b;
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      --shadow-hover: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      width: 100%;
      min-width: 320px;
      margin: 0;
      padding: 0;
      background: var(--bg-gradient);
      color: var(--text-main);
      overflow-x: hidden;
      height: 100vh;
    }

    .main-container {
      padding: 20px;
      min-height: 280px;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(to right, #6366f1, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .status-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
    }

    .status-paired {
      background: #dcfce7;
      color: #15803d;
      border: 1px solid #bbf7d0;
    }

    .status-unpaired {
      background: #fee2e2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .status-container {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .connection-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9ca3af;
    }

    .dot-online { background: #10b981; box-shadow: 0 0 8px #10b981; }
    .dot-offline { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }

    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--shadow);
      text-align: center;
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .otp-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .otp-display {
      font-size: 42px;
      font-weight: 800;
      color: var(--primary);
      margin: 12px 0;
      font-variant-numeric: tabular-nums;
      letter-spacing: 4px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #otpContent {
      display: inline-block;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .otp-meta {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 24px;
    }

    .action-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button {
      position: relative;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      overflow: hidden;
      transform: translateZ(0);
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: all 0.5s;
    }

    button:hover::before {
      left: 100%;
    }

    .btn-main {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
    }

    .btn-main:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
    }

    .btn-main:active {
      transform: translateY(0);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid transparent;
    }

    .btn-ghost:hover {
      background: rgba(0, 0, 0, 0.05);
      color: var(--text-main);
    }

    .offline-banner {
      background: #ef4444;
      color: white;
      text-align: center;
      padding: 8px;
      font-size: 12px;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 100;
      display: none;
    }
    
    .offline-banner.active {
      display: block;
    }

    .empty-state {
      padding: 20px 0;
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 16px;
      display: block;
    }

    .empty-text {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .hidden {
      display: none !important;
    }

    /* Tooltip simulation */
    .btn-main::after {
      content: 'Copied!';
      position: absolute;
      top: -30px;
      background: #374151;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .btn-main.copied::after {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="offlineBanner" class="offline-banner">
    ⚠️ Browser is Offline
  </div>
  <div class="main-container">
    <div class="header">
      <div class="logo-area">
        <span class="logo-text">PinBridge</span>
      </div>
      <div class="status-container">
        <div id="statusBadge" class="status-badge status-unpaired">Disconnected</div>
        <div id="connectionIndicator" class="connection-indicator hidden">
          <span id="statusDot" class="dot"></span>
          <span id="statusText">Offline</span>
        </div>
      </div>
    </div>

    <!-- Active OTP View -->
    <div id="otpView" class="hidden">
      <div class="card">
        <div class="otp-label">Security Code</div>
        <div id="otpValue" class="otp-display"><span id="otpContent">------</span></div>
        <div id="otpTime" class="otp-meta">Waiting for signal...</div>
        
        <div class="action-group">
          <button id="copyBtn" class="btn-main">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            Copy Code
          </button>
          <button id="manualFetchBtn" class="btn-main" style="background: #10b981;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
            Fetch Latest
          </button>
          <button id="mirrorWebBtn" class="btn-main" style="background: #a855f7;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
            Mirror on Web
          </button>
          <button id="signOutBtn" class="btn-ghost">Unpair Device</button>
        </div>
      </div>
    </div>

    <!-- Unpaired View -->
    <div id="unpairedView">
      <div class="card empty-state">
        <span class="empty-icon">📱</span>
        <div class="empty-text">
          Pair your browser with the PinBridge Android app to start mirroring OTPs.
        </div>
        <button id="pairBtn" class="btn-main">
          Pair New Device
        </button>
      </div>
    </div>
  </div>

  <script src="dist/popup.js"></script>
</body>
</html>
