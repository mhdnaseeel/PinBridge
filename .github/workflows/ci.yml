name: PinBridge CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: set up JDK 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Build with Gradle
        run: cd android && ./gradlew build
      - name: Run unit tests
        run: cd android && ./gradlew test

  functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 18
      - name: Install dependencies
        run: cd functions && npm install
      - name: Deploy to Firebase
        if: github.ref == 'refs/heads/main'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npm install -g firebase-tools
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "FIREBASE_TOKEN is empty. Skipping deployment."
          else
            firebase deploy --only functions --token "$FIREBASE_TOKEN"
          fi
  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 18
      - name: Install dependencies
        run: cd extension && npm install
      - name: Build extension
        run: cd extension && npm run build
      - name: Run tests
        run: cd extension && npm test

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 18
      - name: Install dependencies
        run: cd web && npm install
      - name: Build web dashboard
        run: cd web && npm run build

  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 18
      - name: Install dependencies
        run: cd server && npm install
      - name: Validate server syntax
        run: cd server && node --check index.js && echo "Server syntax OK"
      - name: Run tests
        run: cd server && npm test

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Secret scanning with Gitleaks
        uses: gitleaks/gitleaks-action@f586c14365d4643c6aa59d472ae6e984bf47bb34 # v2.3.8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Dependency audit - Extension
        run: cd extension && npm install && npm audit --audit-level=high || true
      - name: Dependency audit - Server
        run: cd server && npm install && npm audit --audit-level=high || true
      - name: Dependency audit - Web
        run: cd web && npm install && npm audit --audit-level=high || true

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [extension, web] # Run only if builds compile securely
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 18
      - name: Install dependencies
        run: cd e2e && npm install
      - name: Install Playwright Browsers
        run: cd e2e && npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: cd e2e && npm run test
